name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Quality (best, 1080, 720, bestaudio)'
        required: true
        default: 'best'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip ffmpeg
          ffmpeg -version
          pip3 install --upgrade yt-dlp
          yt-dlp --version

      - name: Validate URL
        run: |
          if [[ ! "${{ inputs.url }}" =~ ^https?://(www\.)?(youtube\.com|youtu\.be)/ ]]; then
            echo "❌ Invalid YouTube URL: ${{ inputs.url }}"
            exit 1
          fi
          echo "✅ URL looks valid"

      - name: Download video (verbose)
        run: |
          mkdir -p downloads
          echo "Downloading with quality: ${{ inputs.quality }}"
          yt-dlp -v \
            --sleep-interval 3 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -f "${{ inputs.quality }}" \
            -o "downloads/%(title)s.%(ext)s" \
            "${{ inputs.url }}"
          
          if [ $? -ne 0 ]; then
            echo "⚠️ First attempt failed. Retrying with 'best' quality..."
            yt-dlp -v \
              -f "best" \
              -o "downloads/%(title)s.%(ext)s" \
              "${{ inputs.url }}"
          fi

      - name: List downloaded files
        run: ls -la downloads/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: downloads/
          retention-days: 7
